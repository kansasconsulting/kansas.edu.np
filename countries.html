<!-- contactus.html (example contact form) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | KansasConsultancy</title>
  " />
</head>
<body>
  <!-- You can keep the same header/menu as other pages -->

  <div class="contact-wrapper">
    <h1>Contact Us</h1>
    <p>Fill out the form below and we will contact you as soon as possible.</p>

    <form action="contact_process.php" method="POST" class="contact-form">
      <div class="form-group">
        abel for="name">Full Name *</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        abel for="email">Email *</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        abel for="phone">Phone / WhatsApp</label>
        <input type="text" id="phone" name="phone" />
      </div>

      <div class="form-group">
        abel for="country">Preferred Study Country</label>
        <select id="country" name="country">
          <option value="">Select country</option>
          <option value="United Kingdom">United Kingdom</option>
          <option value="USA">USA</option>
          <option value="Australia">Australia</option>
          <option value="Canada">Canada</option>
          <option value="India">India</option>
          <option value="New Zealand">New Zealand</option>
          <option value="Germany">Germany</option>
          <option value="France">France</option>
          <option value="Japan">Japan</option>
          <option value="South Korea">South Korea</option>
          <option value="Finland">Finland</option>
          <option value="Denmark">Denmark</option>
        </select>
      </div>

      <div class="form-group">
        abel for="message">Your Message *</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>

  <!-- Your existing footer here -->
</body>
</html>
